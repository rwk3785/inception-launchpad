name: Epic Generator

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: "Project Name"
        required: true
        type: string
      business_problem:
        description: "Business Problem"
        required: true
        type: string
      scope_boundaries:
        description: "Scope Boundaries"
        required: true
        type: string
      target_users:
        description: "Target Users"
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate Epics with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROJECT_NAME: ${{ inputs.project_name }}
          BUSINESS_PROBLEM: ${{ inputs.business_problem }}
          SCOPE_BOUNDARIES: ${{ inputs.scope_boundaries }}
          TARGET_USERS: ${{ inputs.target_users }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request

          prompt = (
              "Break down a brokerage product initiative into epics suitable for agile delivery using the following details:\n\n"
              "Project Name: " + os.environ['PROJECT_NAME'] + "\n"
              "Business Problem: " + os.environ['BUSINESS_PROBLEM'] + "\n"
              "Scope Boundaries: " + os.environ['SCOPE_BOUNDARIES'] + "\n"
              "Target Users: " + os.environ['TARGET_USERS'] + "\n\n"
              "For each epic provide:\n"
              "- Epic title\n"
              "- Business objective\n"
              "- User story summary in the format: \"As a [user] I want [goal] so that [benefit]\"\n"
              "- Acceptance criteria (3-5 bullet points)\n"
              "- Dependencies (on other epics or external systems)\n"
              "- Estimated complexity (S/M/L/XL)\n"
              "- Suggested team (e.g., frontend, backend, data, compliance)\n\n"
              "Generate 5-8 epics that together cover the full scope of the initiative. The epics should be coherent, non-overlapping, and deliverable in logical sequence.\n\n"
              "Include a dependency map section at the end that shows the sequencing and relationships between epics.\n\n"
              "Format the entire output as structured markdown."
          )

          payload = json.dumps({
              "model": "claude-opus-4-5",
              "max_tokens": 4096,
              "messages": [{"role": "user", "content": prompt}]
          }).encode()

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=payload,
              headers={
                  "x-api-key": os.environ["ANTHROPIC_API_KEY"],
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json"
              }
          )

          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())

          content = data["content"][0]["text"]
          os.makedirs("docs/inception", exist_ok=True)
          with open("docs/inception/EPICS.md", "w") as f:
              f.write("# Epics: " + os.environ['PROJECT_NAME'] + "\n\n")
              f.write(content)
          print("Generated successfully")
          PYEOF

      - name: Commit and push
        run: |
          git config user.email "inception-bot@launchpad"
          git config user.name "Inception Launchpad Bot"
          git add docs/inception/
          git commit -m "feat: Generated Epics for ${{ inputs.project_name }}"
          git push
