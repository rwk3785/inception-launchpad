name: Feasibility Analyzer

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: "Project Name"
        required: true
        type: string
      business_problem:
        description: "Business Problem"
        required: true
        type: string
      business_domain:
        description: "Business Domain"
        required: true
        type: string
      timeline_constraint:
        description: "Timeline Constraint"
        required: true
        type: string
      key_dependencies:
        description: "Key Dependencies"
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate Feasibility Report with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROJECT_NAME: ${{ inputs.project_name }}
          BUSINESS_PROBLEM: ${{ inputs.business_problem }}
          BUSINESS_DOMAIN: ${{ inputs.business_domain }}
          TIMELINE_CONSTRAINT: ${{ inputs.timeline_constraint }}
          KEY_DEPENDENCIES: ${{ inputs.key_dependencies }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request

          prompt = (
              "Produce a feasibility analysis for a brokerage product initiative with the following details:\n\n"
              "Project Name: " + os.environ['PROJECT_NAME'] + "\n"
              "Business Problem: " + os.environ['BUSINESS_PROBLEM'] + "\n"
              "Business Domain: " + os.environ['BUSINESS_DOMAIN'] + "\n"
              "Timeline Constraint: " + os.environ['TIMELINE_CONSTRAINT'] + "\n"
              "Key Dependencies: " + os.environ['KEY_DEPENDENCIES'] + "\n\n"
              "The report must cover these sections:\n\n"
              "1. Executive Summary - brief overview of the initiative and overall feasibility verdict\n"
              "2. Technical Feasibility - complexity assessment, technology risks, integration needs\n"
              "3. Business Feasibility - market fit, ROI potential, strategic alignment\n"
              "4. Resource Feasibility - team skills required, capacity considerations, budget factors\n"
              "5. Timeline Feasibility - given the constraint of \"" + os.environ['TIMELINE_CONSTRAINT'] + "\", assess achievability and propose key milestones\n"
              "6. Risk Assessment - top 5 risks with a likelihood/impact matrix (High/Medium/Low for each dimension)\n"
              "7. Recommendation - Go / No-Go / Conditional Go with clear rationale\n\n"
              "Include a summary scorecard at the very top of the document that rates each feasibility dimension (Technical, Business, Resource, Timeline) on a scale of Red/Amber/Green with a one-line justification.\n\n"
              "Format as a professional markdown report."
          )

          payload = json.dumps({
              "model": "claude-opus-4-5",
              "max_tokens": 4096,
              "messages": [{"role": "user", "content": prompt}]
          }).encode()

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=payload,
              headers={
                  "x-api-key": os.environ["ANTHROPIC_API_KEY"],
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json"
              }
          )

          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())

          content = data["content"][0]["text"]
          os.makedirs("docs/inception", exist_ok=True)
          with open("docs/inception/FEASIBILITY_REPORT.md", "w") as f:
              f.write("# Feasibility Report: " + os.environ['PROJECT_NAME'] + "\n\n")
              f.write(content)
          print("Generated successfully")
          PYEOF

      - name: Commit and push
        run: |
          git config user.email "inception-bot@launchpad"
          git config user.name "Inception Launchpad Bot"
          git add docs/inception/
          git commit -m "feat: Generated Feasibility Report for ${{ inputs.project_name }}"
          git push
