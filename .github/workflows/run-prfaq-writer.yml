name: PRFAQ Writer

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: "Project Name"
        required: true
        type: string
      business_problem:
        description: "Business Problem"
        required: true
        type: string
      target_users:
        description: "Target Users"
        required: true
        type: string
      key_benefit:
        description: "Key Benefit"
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate PRFAQ with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROJECT_NAME: ${{ inputs.project_name }}
          BUSINESS_PROBLEM: ${{ inputs.business_problem }}
          TARGET_USERS: ${{ inputs.target_users }}
          KEY_BENEFIT: ${{ inputs.key_benefit }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request

          prompt = (
              "Generate a Press Release and FAQ document for a brokerage product initiative.\n\n"
              "Project Name: " + os.environ['PROJECT_NAME'] + "\n"
              "Business Problem: " + os.environ['BUSINESS_PROBLEM'] + "\n"
              "Target Users: " + os.environ['TARGET_USERS'] + "\n"
              "Key Benefit: " + os.environ['KEY_BENEFIT'] + "\n\n"
              "Write an Amazon Working Backwards PR/FAQ with:\n"
              "1. PRESS RELEASE: Headline, subheadline, date/location, 3 body paragraphs, customer quote, call to action\n"
              "2. CUSTOMER FAQ: 5 questions customers would ask\n"
              "3. INTERNAL FAQ: 5 questions the team needs to answer\n\n"
              "Use plain business language. Format as markdown."
          )

          payload = json.dumps({
              "model": "claude-opus-4-5",
              "max_tokens": 4096,
              "messages": [{"role": "user", "content": prompt}]
          }).encode()

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=payload,
              headers={
                  "x-api-key": os.environ["ANTHROPIC_API_KEY"],
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json"
              }
          )

          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())

          content = data["content"][0]["text"]
          os.makedirs("docs/inception", exist_ok=True)
          with open("docs/inception/PRFAQ.md", "w") as f:
              f.write("# PRFAQ: " + os.environ['PROJECT_NAME'] + "\n\n")
              f.write(content)
          print("PRFAQ generated successfully")
          PYEOF

      - name: Commit and push
        run: |
          git config user.email "inception-bot@launchpad"
          git config user.name "Inception Launchpad Bot"
          git add docs/inception/
          git commit -m "feat: Generated PRFAQ for ${{ inputs.project_name }}"
          git push
