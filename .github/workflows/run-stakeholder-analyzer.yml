name: Stakeholder Analyzer

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: "Project Name"
        required: true
        type: string
      business_problem:
        description: "Business Problem"
        required: true
        type: string
      business_domain:
        description: "Business Domain"
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate Stakeholder Analysis with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROJECT_NAME: ${{ inputs.project_name }}
          BUSINESS_PROBLEM: ${{ inputs.business_problem }}
          BUSINESS_DOMAIN: ${{ inputs.business_domain }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request

          prompt = (
              "Analyze and identify all stakeholders for a brokerage product initiative with the following details:\n\n"
              "Project Name: " + os.environ['PROJECT_NAME'] + "\n"
              "Business Problem: " + os.environ['BUSINESS_PROBLEM'] + "\n"
              "Business Domain: " + os.environ['BUSINESS_DOMAIN'] + "\n\n"
              "For each stakeholder group produce:\n"
              "- Role/title\n"
              "- Interest in the project\n"
              "- Potential impact level (High/Medium/Low)\n"
              "- Engagement strategy\n"
              "- Key concerns to address\n\n"
              "Include internal stakeholders (business, tech, compliance, ops) and external stakeholders (customers, regulators, partners).\n\n"
              "Format as a structured markdown document with:\n"
              "1. A summary table at the top showing all stakeholder groups, their impact level, and engagement strategy\n"
              "2. Detailed sections per stakeholder group below the table\n\n"
              "Be thorough and specific to the brokerage/financial services domain."
          )

          payload = json.dumps({
              "model": "claude-opus-4-5",
              "max_tokens": 4096,
              "messages": [{"role": "user", "content": prompt}]
          }).encode()

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=payload,
              headers={
                  "x-api-key": os.environ["ANTHROPIC_API_KEY"],
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json"
              }
          )

          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())

          content = data["content"][0]["text"]
          os.makedirs("docs/inception", exist_ok=True)
          with open("docs/inception/STAKEHOLDER_ANALYSIS.md", "w") as f:
              f.write("# Stakeholder Analysis: " + os.environ['PROJECT_NAME'] + "\n\n")
              f.write(content)
          print("Generated successfully")
          PYEOF

      - name: Commit and push
        run: |
          git config user.email "inception-bot@launchpad"
          git config user.name "Inception Launchpad Bot"
          git add docs/inception/
          git commit -m "feat: Generated Stakeholder Analysis for ${{ inputs.project_name }}"
          git push
